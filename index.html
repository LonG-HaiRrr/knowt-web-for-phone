<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
  <title>Trắc nghiệm Knowt - Hướng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#111111] text-white font-sans pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)] h-screen overflow-hidden flex flex-col relative">

  <!-- ================= LOBBY SCREEN ================= -->
  <div id="lobby-screen" class="flex-1 px-4 py-8 flex flex-col h-full overflow-y-auto w-full max-w-md mx-auto">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold">Thư viện bài học</h1>
      <button id="btn-settings-lobby" class="w-10 h-10 bg-[#222222] rounded-full flex items-center justify-center text-xl hover:bg-[#333] transition">⚙️</button>
    </div>
    <div id="deck-list" class="flex flex-col gap-4">
       <!-- JS sẽ tự động đổ các nút bài học vào đây -->
       <p class="text-gray-400 text-center italic mt-10">Đang quét thư mục data...</p>
    </div>
  </div>

  <!-- ================= QUIZ SCREEN (Mặc định ẩn) ================= -->
  <div id="quiz-screen" class="hidden flex-1 flex-col h-full overflow-hidden w-full max-w-md mx-auto">
    
    <!-- TOP BAR -->
    <div class="flex items-center justify-between px-4 py-3 shrink-0">
      <button id="btn-exit" class="w-10 h-10 bg-[#222222] rounded-full flex items-center justify-center text-xl hover:bg-[#333] transition">✕</button>
      <div class="flex-1 mx-4 h-2 bg-[#333333] rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-gray-400 w-0 transition-all duration-300 rounded-full"></div>
      </div>
      <div class="flex gap-2 items-center">
        <div class="px-3 py-1 bg-[#1c2c36] text-[#3ca3f0] font-bold rounded-full flex items-center gap-1 text-sm">
          <span id="card-counter">0</span> 🗡️
        </div>
        <button id="btn-settings-quiz" class="w-10 h-10 bg-[#222222] rounded-full flex items-center justify-center text-xl hover:bg-[#333] transition">⚙️</button>
      </div>
    </div>

    <!-- MAIN CARD -->
    <div class="flex-1 px-4 pb-6 pt-2 flex flex-col overflow-hidden">
      <div class="bg-[#1c1c1e] flex-1 rounded-[24px] p-5 flex flex-col shadow-lg border border-[#2c2c2e] overflow-y-auto relative">
        <div class="flex justify-between items-center mb-6 shrink-0">
          <!-- Thay Select thành Span hiển thị text -->
          <span id="current-deck-name" class="bg-[#3b2b35] text-[#d685af] px-3 py-1.5 rounded-lg text-sm font-semibold">◯ Đang tải...</span>
          <div class="flex gap-4 text-gray-400 text-xl">
            <button class="hover:text-white transition" onclick="playQuestionAudio()">🔊</button>
          </div>
        </div>

        <div class="mb-6 shrink-0">
          <h1 id="q-hira" class="font-bold mb-3 transition-all">...</h1>
          <h2 id="q-kanji" class="text-gray-300 transition-all">...</h2>
        </div>

        <div id="options-container" class="flex flex-col gap-3 mt-auto shrink-0"></div>

        <div id="next-btn-container" class="mt-4 hidden shrink-0">
          <button id="btn-manual-next" class="w-full bg-[#0070ef] hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-colors">Tiếp theo ➔</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= BẢNG SETTINGS (DÙNG CHUNG) ================= -->
  <div id="settings-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col justify-end">
    <div class="bg-[#1c1c1e] rounded-t-[24px] p-6 border-t border-[#2c2c2e] transform transition-transform translate-y-full max-h-[85vh] overflow-y-auto" id="settings-content">
      
      <div class="flex justify-between items-center mb-6 sticky top-0 bg-[#1c1c1e] z-10 pb-2">
        <h2 class="text-xl font-bold">Cài đặt Cấu hình</h2>
        <button id="btn-close-settings" class="w-8 h-8 bg-[#333] rounded-full font-bold">✕</button>
      </div>

      <div class="flex flex-col gap-4">
        <!-- AUTO NEXT -->
        <div class="flex justify-between items-center bg-[#2c1c36] p-3 rounded-xl border border-[#442c4f]">
          <span class="font-bold text-[#d685af]">Tự động qua câu</span>
          <input type="checkbox" id="set-auto-next" class="w-5 h-5 accent-pink-500 cursor-pointer">
        </div>

        <!-- TTS SETTINGS -->
        <div class="flex justify-between items-center bg-[#101a2a] p-3 rounded-xl border border-gray-700">
          <span class="font-bold text-white">Đọc câu hỏi</span>
          <input type="checkbox" id="set-auto-q" checked class="w-5 h-5 accent-blue-500 cursor-pointer">
        </div>
        <div class="flex flex-col bg-[#131836] p-3 rounded-xl border border-gray-700 gap-2">
          <div class="flex justify-between items-center">
            <span class="font-bold text-white">Delay đọc (giây)</span>
            <span id="delay-val" class="text-orange-500 font-bold">1.5s</span>
          </div>
          <!-- Đã cập nhật Delay 0 - 8 giây -->
          <input type="range" id="set-delay" min="0" max="8" step="0.5" value="1.5" class="w-full accent-orange-500">
        </div>
        <div class="flex justify-between items-center bg-[#2a1010] p-3 rounded-xl border border-gray-700">
          <span class="font-bold text-white">Đọc đáp án đúng</span>
          <input type="checkbox" id="set-auto-ans" class="w-5 h-5 accent-green-500 cursor-pointer">
        </div>

        <h3 class="font-bold text-lg text-white mt-4 border-b border-gray-700 pb-2">Chữ (Font & Size 12-45px)</h3>
        
        <!-- Hira Config -->
        <div class="bg-[#1c1c1e] p-3 rounded-xl border border-gray-600">
          <div class="text-sm font-bold text-blue-400 mb-2 flex justify-between">
            <span>Chữ Hiragana/Katakana</span>
            <span id="fs-hira-val">25px</span>
          </div>
          <select id="ff-hira" class="w-full bg-[#2c2c2e] text-white text-xs p-2 rounded mb-3 outline-none border border-gray-500">
            <option value="sans-serif">Cơ bản (Sans-serif)</option>
            <option value="serif">Có chân (Serif)</option>
            <option value="'Klee One', cursive">Nét bút lông/Viết tay</option>
          </select>
          <input type="range" id="fs-hira" min="12" max="45" value="25" class="w-full accent-blue-500">
        </div>

        <!-- Kanji Config -->
        <div class="bg-[#1c1c1e] p-3 rounded-xl border border-gray-600">
          <div class="text-sm font-bold text-green-400 mb-2 flex justify-between">
            <span>Chữ Kanji</span>
            <span id="fs-kanji-val">26px</span>
          </div>
          <select id="ff-kanji" class="w-full bg-[#2c2c2e] text-white text-xs p-2 rounded mb-3 outline-none border border-gray-500">
            <option value="sans-serif">Cơ bản (Sans-serif)</option>
            <option value="serif">Có chân (Serif)</option>
            <option value="'Klee One', cursive">Nét bút lông/Viết tay</option>
          </select>
          <input type="range" id="fs-kanji" min="12" max="45" value="26" class="w-full accent-green-500">
        </div>

        <!-- Meaning Config -->
        <div class="bg-[#1c1c1e] p-3 rounded-xl border border-gray-600">
          <div class="text-sm font-bold text-orange-400 mb-2 flex justify-between">
            <span>Chữ Nghĩa (Đáp án)</span>
            <span id="fs-mean-val">19px</span>
          </div>
          <select id="ff-mean" class="w-full bg-[#2c2c2e] text-white text-xs p-2 rounded mb-3 outline-none border border-gray-500">
            <option value="sans-serif">Cơ bản (Sans-serif)</option>
            <option value="serif">Có chân (Serif)</option>
          </select>
          <input type="range" id="fs-mean" min="12" max="45" value="19" class="w-full accent-orange-500">
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
